default_language_version:
  python: python3.14

ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: tests/fixtures/models/corrupt_json_bundle/
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [--python-version=3.14]

  - repo: local
    hooks:
      - id: biome-check
        name: biome check frontend
        entry: pnpm --dir src/taskclf/ui/frontend exec biome check --write --diagnostic-level=error src/
        language: system
        files: ^src/taskclf/ui/frontend/src/
        pass_filenames: false
