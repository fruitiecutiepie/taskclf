name: Payload Release

# Skips when the tagged commit only touches paths that do not affect the PyInstaller sidecar
# (e.g. electron/ or docs). workflow_dispatch always runs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release-scope:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.paths.outputs.run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether this tag affects the payload
        id: paths
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" -- \
              src/ pyproject.toml uv.lock scripts/ Makefile \
              src/taskclf/ui/frontend/ | grep -q .; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no changes under src/, pyproject.toml, uv.lock, scripts/, Makefile, or src/taskclf/ui/frontend/ in this tag."
          fi

  build-payload:
    needs: release-scope
    if: needs.release-scope.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --group bundle

      - name: Build payload
        run: make build-payload

      - name: Host target triple
        id: host
        shell: bash
        run: echo "triple=$(python3 scripts/host_target_triple.py)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: payload-${{ steps.host.outputs.triple }}
          path: build/payload-${{ steps.host.outputs.triple }}.zip

  publish:
    needs: build-payload
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: payloads
          pattern: payload-*
          merge-multiple: true

      - name: Generate manifest.json
        run: |
          python3 -c "
          import glob, json, hashlib, os, re
          version = os.environ.get('GITHUB_REF', '').replace('refs/tags/v', '')
          repo = os.environ.get('GITHUB_REPOSITORY', 'fruitiecutiepie/taskclf')
          manifest = {'kind': 'payload', 'schema_version': 1, 'version': version, 'platforms': {}}
          paths = glob.glob('payloads/payload-*.zip') + glob.glob('payloads/**/payload-*.zip', recursive=True)
          for path in sorted(set(paths)):
              base = os.path.basename(path)
              m = re.match(r'^payload-(.+)\.zip$', base)
              if not m:
                  continue
              triple = m.group(1)
              sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
              manifest['platforms'][triple] = {
                  'url': f'https://github.com/{repo}/releases/download/v{version}/payload-{triple}.zip',
                  'sha256': sha
              }
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "
          cat manifest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            payloads/*.zip
            manifest.json

  deploy-payload-index:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install docs builder
        run: pip install zensical mkdocstrings-python

      - name: Build docs site
        run: zensical build

      - name: Generate payload-index.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import datetime as dt, json, os, re, urllib.request

          repo = os.environ.get('GITHUB_REPOSITORY', 'fruitiecutiepie/taskclf')
          token = os.environ.get('GITHUB_TOKEN', '')
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/releases?per_page=100',
              headers={
                  'Accept': 'application/vnd.github+json',
                  **({'Authorization': f'Bearer {token}'} if token else {}),
              },
          )
          with urllib.request.urlopen(req) as res:
              releases = json.load(res)

          version_re = re.compile(r'^v(\\d+)\\.(\\d+)\\.(\\d+)$')
          payloads = []
          for release in releases:
              tag = release.get('tag_name', '')
              if not version_re.match(tag):
                  continue
              assets = {asset.get('name') for asset in release.get('assets', [])}
              if 'manifest.json' not in assets:
                  continue
              payloads.append({
                  'version': tag[1:],
                  'manifest_url': f'https://github.com/{repo}/releases/download/{tag}/manifest.json',
              })

          payloads.sort(
              key=lambda item: tuple(int(part) for part in item['version'].split('.')),
              reverse=True,
          )
          payload_index = {
              'kind': 'payload-index',
              'schema_version': 1,
              'generated_at': dt.datetime.now(dt.UTC).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'payloads': payloads,
          }
          with open('site/payload-index.json', 'w', encoding='utf-8') as f:
              json.dump(payload_index, f, indent=2)
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
