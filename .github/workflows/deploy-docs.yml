name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-scope:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip duplicate Pages deploys for payload release commits
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag --points-at "${GITHUB_SHA}" --list 'v*' | grep -q .; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping docs deploy: payload-release.yml will publish GitHub Pages for this v* release commit."
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

  build:
    needs: release-scope
    if: needs.release-scope.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install zensical mkdocstrings-python
      - run: zensical build

      - name: Generate payload-index.json from releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/payload_index.py generate-from-releases \
            --repo "${GITHUB_REPOSITORY}" \
            --token "${GITHUB_TOKEN}" \
            --output site/payload-index.json
          cat site/payload-index.json

      - name: Verify Pages artifact
        run: test -f site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
