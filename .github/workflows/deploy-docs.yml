name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install zensical mkdocstrings-python
      - run: zensical build

      - name: Preserve payload-index.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/payload_index.py preserve-current \
            --repo "${GITHUB_REPOSITORY}" \
            --token "${GITHUB_TOKEN}" \
            --output site/payload-index.json \
            --current-url "https://fruitiecutiepie.github.io/taskclf/payload-index.json"
          cat site/payload-index.json

      - name: Verify Pages artifact
        run: test -f site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
