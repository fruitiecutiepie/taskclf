name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install zensical mkdocstrings-python
      - run: zensical build

      - name: Generate payload-index.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import datetime as dt, json, os, re, urllib.request

          repo = os.environ.get('GITHUB_REPOSITORY', 'fruitiecutiepie/taskclf')
          token = os.environ.get('GITHUB_TOKEN', '')
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/releases?per_page=100',
              headers={
                  'Accept': 'application/vnd.github+json',
                  **({'Authorization': f'Bearer {token}'} if token else {}),
              },
          )
          with urllib.request.urlopen(req) as res:
              releases = json.load(res)

          version_re = re.compile(r'^v(\\d+)\\.(\\d+)\\.(\\d+)$')
          payloads = []
          for release in releases:
              tag = release.get('tag_name', '')
              if not version_re.match(tag):
                  continue
              assets = {asset.get('name') for asset in release.get('assets', [])}
              if 'manifest.json' not in assets:
                  continue
              payloads.append({
                  'version': tag[1:],
                  'manifest_url': f'https://github.com/{repo}/releases/download/{tag}/manifest.json',
              })

          payloads.sort(
              key=lambda item: tuple(int(part) for part in item['version'].split('.')),
              reverse=True,
          )
          payload_index = {
              'kind': 'payload-index',
              'schema_version': 1,
              'generated_at': dt.datetime.now(dt.UTC).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'payloads': payloads,
          }
          with open('site/payload-index.json', 'w', encoding='utf-8') as f:
              json.dump(payload_index, f, indent=2)
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
