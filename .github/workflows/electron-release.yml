name: Electron Launcher Release

# Skips expensive builds when the tagged commit changes only unrelated paths (e.g. docs).
# workflow_dispatch always runs the full workflow.

on:
  push:
    tags: ["launcher-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-scope:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.paths.outputs.run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether this tag affects the launcher bundle
        id: paths
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" -- \
              electron/ src/ pyproject.toml uv.lock scripts/ Makefile \
              src/taskclf/ui/frontend/ | grep -q .; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no changes under electron/, src/, pyproject.toml, uv.lock, scripts/, Makefile, or src/taskclf/ui/frontend/ in this tag."
          fi

  electron-build:
    needs: release-scope
    if: needs.release-scope.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --group bundle

      - name: Build backend payload (PyInstaller zip)
        run: make build-payload

      - name: Host target triple
        id: host
        shell: bash
        run: echo "triple=$(python3 scripts/host_target_triple.py)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: payload-${{ steps.host.outputs.triple }}
          path: build/payload-${{ steps.host.outputs.triple }}.zip

      - name: Install Electron dependencies
        run: pnpm install --frozen-lockfile
        working-directory: electron

      - name: Compile TypeScript
        run: pnpm run build
        working-directory: electron

      - name: Package Electron app
        run: pnpm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v7
        with:
          name: electron-${{ matrix.os }}
          path: |
            electron/release/*.dmg
            electron/release/*.AppImage
            electron/release/*.exe

  publish:
    needs: electron-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/launcher-v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: payloads
          pattern: payload-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          path: electron-dist
          pattern: electron-*
          merge-multiple: true

      - name: Generate manifest.json
        run: |
          python3 -c "
          import glob, json, hashlib, os, re
          ref = os.environ.get('GITHUB_REF', '')
          tag = ref.replace('refs/tags/', '')
          if tag.startswith('launcher-v'):
              version = tag[len('launcher-v'):]
          elif tag.startswith('v'):
              version = tag[1:]
          else:
              version = tag
          repo = os.environ.get('GITHUB_REPOSITORY', 'fruitiecutiepie/taskclf')
          manifest = {'version': version, 'platforms': {}}
          paths = (
              glob.glob('payloads/payload-*.zip')
              + glob.glob('payloads/**/payload-*.zip', recursive=True)
          )
          for path in sorted(set(paths)):
              base = os.path.basename(path)
              m = re.match(r'^payload-(.+)\.zip$', base)
              if not m:
                  continue
              triple = m.group(1)
              sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
              manifest['platforms'][triple] = {
                  'url': f'https://github.com/{repo}/releases/download/{tag}/payload-{triple}.zip',
                  'sha256': sha,
              }
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "
          cat manifest.json

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-upload
          find payloads -name 'payload-*.zip' -exec cp {} release-upload/ \;
          find electron-dist -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.exe' \) -exec cp {} release-upload/ \;
          cp manifest.json release-upload/
          ls -la release-upload/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-upload/manifest.json
            release-upload/payload-*.zip
            release-upload/*.dmg
            release-upload/*.AppImage
            release-upload/*.exe
