name: Bug Report
description: Report a bug or unexpected behavior in taskclf.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.
        If you have `taskclf` installed, run `taskclf diagnostics` and paste the output in the **Diagnostics** field.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `taskclf ...`
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics output
      description: Paste the output of `taskclf diagnostics` (if available).
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Log excerpt
      description: |
        Paste relevant lines from `<TASKCLF_HOME>/logs/taskclf.log`.
        On macOS: `~/Library/Application Support/taskclf/logs/taskclf.log`
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might be helpful.
