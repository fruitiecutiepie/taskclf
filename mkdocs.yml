site_name: taskclf
site_description: Task Type Classifier from Local Activity Signals
site_url: https://fruitiecutiepie.github.io/taskclf/
site_author: fruitiecutiepie
copyright: Copyright &copy; 2026 fruitiecutiepie
repo_url: https://github.com/fruitiecutiepie/taskclf
repo_name: fruitiecutiepie/taskclf
edit_uri: edit/master/docs/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fruitiecutiepie/taskclf
  generator: false

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md

  - Guide:
      - Basics:
          - Getting Started: guide/usage.md
          - Privacy Model: guide/privacy.md
          - Acceptance Criteria: guide/acceptance.md
      - Data & Labels:
          - Task Labels (v1): guide/labels_v1.md
          - Custom Taxonomy: guide/taxonomy.md
          - Time & Bucket Alignment: guide/time_spec.md
      - Modeling:
          - Train/Val Splits: guide/splits.md
          - Model Selection: guide/model_selection.md
          - Model Bundle Layout: guide/model_bundle_layout.md
          - Bundle Metrics Contract: guide/metrics_contract.md
      - Deployment:
          - Inference Pipeline: guide/model_io.md
          - Per-User Calibration: guide/personalization.md

  - API Reference:
      - Core — Schema & Types:
          - Core Types: api/core/types.md
          - Feature Schema: api/core/schema.md
          - Schema Hashing: api/core/hashing.md
          - Data Validation: api/core/validation.md
      - Core — Configuration:
          - Defaults: api/core/defaults.md
          - User Identity: api/core/config.md
          - Logging & Sanitization: api/core/logging.md
      - Core — Storage & Time:
          - Time & Buckets: api/core/time.md
          - Data Store: api/core/store.md
      - Core — Models & Metrics:
          - Model Bundles: api/core/model_io.md
          - Model Registry: api/model_registry.md
          - Evaluation Metrics: api/core/metrics.md
      - Core — Observability:
          - Drift Detection: api/core/drift.md
          - Quality Telemetry: api/core/telemetry.md
      - Adapters:
          - ActivityWatch: api/adapters/activitywatch.md
      - Features:
          - Build Pipeline: api/features/build.md
          - Session Detection: api/features/sessions.md
          - Rolling Windows: api/features/windows.md
          - Temporal Dynamics: api/features/dynamics.md
          - Title Featurization: api/features/text.md
          - Domain Classification: api/features/domain.md
      - Labels:
          - Label Store: api/labels/store.md
          - Label Projection: api/labels/projection.md
          - Labeling Queue: api/labels/queue.md
      - Training:
          - Build Dataset: api/train/build_dataset.md
          - Time-Based Splits: api/train/dataset.md
          - LightGBM Trainer: api/train/lgbm.md
          - Calibrator Fitting: api/train/calibrate.md
          - Model Evaluation: api/train/evaluate.md
          - Retrain Pipeline: api/train/retrain.md
      - Inference:
          - Baseline (Rule-Based): api/infer/baseline.md
          - Batch Inference: api/infer/batch.md
          - Online Loop: api/infer/online.md
          - Prediction Types: api/infer/prediction.md
          - Probability Calibration: api/infer/calibration.md
          - Prediction Smoothing: api/infer/smooth.md
          - Drift Monitor: api/infer/monitor.md
          - Task Taxonomy: api/infer/taxonomy.md
      - Reports:
          - Daily Report: api/report/daily.md
          - Report Export: api/report/export.md
      - UI:
          - Web UI & System Tray: api/ui/labeling.md
      - CLI:
          - Commands: api/cli/main.md
