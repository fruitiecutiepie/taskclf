site_name: taskclf
site_description: Task Type Classifier from Local Activity Signals
site_url: https://fruitiecutiepie.github.io/taskclf/
site_author: fruitiecutiepie
copyright: Copyright &copy; 2026 fruitiecutiepie
repo_url: https://github.com/fruitiecutiepie/taskclf
repo_name: fruitiecutiepie/taskclf
edit_uri: edit/master/docs/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fruitiecutiepie/taskclf
  generator: false

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Guide:
      - Usage: guide/usage.md
      - Taxonomy Mapping: guide/taxonomy.md
  - API Reference:
      - Core:
          - Configuration: api/core/defaults.md
          - Core Types: api/core/types.md
          - Feature Schema: api/core/schema.md
          - Schema Hashing: api/core/hashing.md
          - Time & Buckets: api/core/time.md
          - Data Store (Parquet): api/core/store.md
          - Model Bundles: api/core/model_io.md
          - Evaluation Metrics: api/core/metrics.md
          - Logging & Sanitization: api/core/logging.md
      - Adapters:
          - ActivityWatch: api/adapters/activitywatch.md
      - Features:
          - Build Pipeline: api/features/build.md
          - Session Detection: api/features/sessions.md
      - Labels:
          - Label Store: api/labels/store.md
      - Training:
          - Dataset & Splits: api/train/dataset.md
          - LightGBM Trainer: api/train/lgbm.md
          - Evaluation: api/train/evaluate.md
      - Inference:
          - Batch Inference: api/infer/batch.md
          - Online Loop: api/infer/online.md
          - Prediction Types: api/infer/prediction.md
          - Probability Calibration: api/infer/calibration.md
          - Prediction Smoothing: api/infer/smooth.md
          - Task Taxonomy: api/infer/taxonomy.md
      - Reports:
          - Daily Report: api/report/daily.md
          - Report Export: api/report/export.md
      - CLI:
          - Commands: api/cli/main.md
